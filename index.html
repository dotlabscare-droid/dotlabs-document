<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction - dotlabs</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #111;
        }
        p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            display: block;
            padding: 10px 20px;
            background-color: #0066cc;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #0052a3;
        }
        .btn.secondary {
            background-color: #e5e5e5;
            color: #333;
        }
        .btn.secondary:hover {
            background-color: #d5d5d5;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Coming Soon</h1>
    <p>We are currently working on something amazing. Check back soon for updates!</p>
    
    <div class="links">
        <!-- Temporary links to your legal pages if you hosted them as separate files -->
        <a href="privacy-policy.html" class="btn secondary">Privacy Policy</a>
        <a href="terms-of-service.html" class="btn secondary">Terms & Conditions</a>
    </div>
</div>

</body>
</html>
